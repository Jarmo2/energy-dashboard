# docker compose up --build    (starten)
# docker compose down          (stoppen)
# docker compose logs -f       (Logs verfolgen)

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=https://jarmok.de,http://jarmok.de,http://localhost:8000
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
